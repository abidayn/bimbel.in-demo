<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,initial-scale=1">
<title>Bimbel.in Interactive Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --p:#2563EB;--ph:#1D4ED8;--ps:#DBEAFE;--pf:#EFF6FF;
  --s:#FFFFFF;--sm:#F8FAFC;--st:#F0F6FF;
  --t:#0F172A;--tm:#475569;--tf:#94A3B8;
  --ok:#10B981;--oks:#D1FAE5;
  --wn:#F59E0B;--wns:#FEF3C7;
  --er:#EF4444;--ers:#FEE2E2;
  --bd:#E2E8F0;--bds:#CBD5E1;
  --fn:'Plus Jakarta Sans',system-ui,sans-serif;
}
body{font-family:var(--fn);background:#DDE6F0;min-height:100vh;}
#iw{display:flex;flex-direction:column;align-items:center;padding:28px 24px 64px;}
#fw{display:none;padding:28px 24px 64px;}
#topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;justify-content:center;}
.logo{font-size:17px;font-weight:800;color:var(--p);letter-spacing:-.02em;}
.logo em{font-style:normal;font-weight:400;font-size:12px;color:var(--tm);margin-left:4px;}
.mtog{display:flex;background:white;border-radius:99px;padding:3px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.mbtn{padding:5px 13px;border-radius:99px;border:none;cursor:pointer;font-family:var(--fn);font-size:11px;font-weight:700;background:transparent;color:var(--tm);transition:.15s;}
.mbtn.on{background:var(--p);color:white;}
#slbl{font-size:11px;color:var(--tm);font-weight:600;background:white;padding:4px 12px;border-radius:99px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
#ftbtn{padding:5px 14px;border-radius:99px;border:1.5px solid var(--bds);cursor:pointer;font-family:var(--fn);font-size:11px;font-weight:700;color:var(--tm);background:white;}
#ftbtn:hover{border-color:var(--p);color:var(--p);}
#phone{width:260px;height:562px;background:var(--s);border-radius:36px;border:1.5px solid #BCC8D8;box-shadow:0 20px 56px rgba(15,23,42,.2),0 4px 12px rgba(15,23,42,.07);overflow:hidden;position:relative;}
#sbar{position:absolute;top:0;left:0;right:0;height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-size:9.5px;font-weight:700;z-index:30;}
#sbar.l{color:var(--t);}
#sbar.d{color:rgba(255,255,255,.92);}
#scr{position:absolute;top:26px;left:0;right:0;bottom:52px;overflow:hidden;}
#scr.nn{bottom:0;}
#bnav{position:absolute;bottom:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-around;z-index:30;padding:0 4px;}
#bnav.lnv{background:var(--s);border-top:1px solid var(--bd);}
#bnav.dnv{background:rgba(8,16,34,.9);border-top:1px solid rgba(255,255,255,.07);}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;cursor:pointer;user-select:none;}
.ni-i{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--tf);}
.ni-l{font-size:7px;font-weight:600;color:var(--tf);}
.ni.on .ni-i{background:var(--pf);color:var(--p);}
.ni.on .ni-l{color:var(--p);}
.ni.ctr .ni-i{background:var(--p);color:white;width:30px;height:30px;border-radius:10px;}
#bnav.dnv .ni-i{color:rgba(255,255,255,.4);}
#bnav.dnv .ni-l{color:rgba(255,255,255,.4);}
#bnav.dnv .ni.on .ni-i{background:rgba(255,255,255,.15);color:white;}
#bnav.dnv .ni.on .ni-l{color:white;}
#bnav.dnv .ni.ctr .ni-i{background:var(--p);color:white;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;flex-shrink:0;}
.bdg{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:99px;font-size:8px;font-weight:700;}
.bv{background:var(--oks);color:var(--ok);}
.ba{background:var(--ps);color:var(--p);}
.bt{background:var(--wns);color:var(--wn);}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:8px;font-weight:600;background:var(--st);color:var(--tm);}
.stile{background:var(--s);border-radius:10px;padding:9px 8px;box-shadow:0 1px 3px rgba(15,23,42,.07);}
.sv{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.sl{font-size:7.5px;font-weight:600;color:var(--tm);margin-top:2px;}
.pbtn{background:var(--p);color:white;border:none;border-radius:10px;font-family:var(--fn);font-weight:700;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(37,99,235,.22);transition:.1s;}
.pbtn:hover{background:var(--ph);}
.pbtn:active{transform:scale(.97);}
.sbtn{background:var(--s);color:var(--p);border:1.5px solid var(--p);border-radius:8px;font-family:var(--fn);font-weight:700;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sh2{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.sttl{font-size:11px;font-weight:700;}
.slnk{font-size:9px;font-weight:600;color:var(--p);cursor:pointer;}
.scrl{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--sm);}
.scrl::-webkit-scrollbar{display:none;}
.spill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:7.5px;font-weight:700;}
.spt{background:var(--ps);color:var(--p);}
.spm{background:var(--wns);color:var(--wn);}
.sps{background:var(--oks);color:var(--ok);}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;border-bottom:1px solid var(--bd);cursor:pointer;}
.mrow:last-child{border-bottom:none;}
.mrow:hover{background:var(--sm);}
.mlbl{font-size:10px;font-weight:600;color:var(--t);}
.mchv{font-size:13px;color:var(--tf);}
@keyframes sIn{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}
@keyframes sBack{from{opacity:0;transform:translateX(-14px);}to{opacity:1;transform:translateX(0);}}
.si{animation:sIn .18s ease-out;}
.sb2{animation:sBack .18s ease-out;}
@keyframes ck{0%{transform:scale(0);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
.ck-a{animation:ck .4s ease-out forwards;}
#fw{padding:28px 24px 64px;}
.fhdr{text-align:center;margin-bottom:24px;}
.fhdr h2{font-size:20px;font-weight:800;color:var(--t);margin-bottom:4px;}
.fhdr p{font-size:12px;color:var(--tm);}
.fsec{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.14em;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.fsec::after{content:'';flex:1;height:1px;background:var(--bd);}
.fgrid{display:flex;flex-wrap:wrap;gap:16px;}
.ffrm{display:flex;flex-direction:column;align-items:center;gap:7px;}
.flbl{font-size:9px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.07em;}
.fphone{width:260px;height:562px;background:var(--s);border-radius:36px;border:1.5px solid #BCC8D8;box-shadow:0 8px 24px rgba(15,23,42,.12);overflow:hidden;position:relative;}
.fsb{position:absolute;top:0;left:0;right:0;height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-size:9.5px;font-weight:700;z-index:10;}
.fsb.l{color:var(--t);}
.fsb.d{color:rgba(255,255,255,.92);}
.fcnt{position:absolute;top:26px;left:0;right:0;bottom:52px;overflow:hidden;}
.fcnt.nn{bottom:0;}
.fnav{position:absolute;bottom:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-around;z-index:10;padding:0 4px;}
.fnav.lnv{background:var(--s);border-top:1px solid var(--bd);}
.fnav.dnv{background:rgba(8,16,34,.9);}
.fnav .ni-i{color:var(--tf);}
.fnav.dnv .ni-i{color:rgba(255,255,255,.4);}
.fnav.dnv .ni-l{color:rgba(255,255,255,.4);}
.fnav .ni.on .ni-i{background:var(--pf);color:var(--p);}
.fnav .ni.on .ni-l{color:var(--p);}
.fnav.dnv .ni.on .ni-i{background:rgba(255,255,255,.15);color:white;}
.fnav.dnv .ni.on .ni-l{color:white;}
.fnav .ni.ctr .ni-i{background:var(--p);color:white;width:30px;height:30px;border-radius:10px;}
</style>
</head>

// ─── ROUTER ───
let hist=[],cur='home';
function go(id,dir){
  if(!S[id])return;
  const cfg=CFG[id];
  const scr=document.getElementById('scr');
  const bnav=document.getElementById('bnav');
  const sbar=document.getElementById('sbar');
  scr.innerHTML=S[id]();
  void scr.offsetHeight;
  scr.className=dir==='back'?'sb2':'si';
  if(cfg.nav){
    bnav.style.display='flex';
    scr.style.bottom='52px';
    bnav.innerHTML=cfg.nav==='student'?navS(cfg.a):navT(cfg.a);
    bnav.className=cfg.dk?'dnv':'lnv';
    sbar.className=cfg.dk?'d':'l';
  }else{
    bnav.style.display='none';
    scr.style.bottom='0';
    sbar.className='l';
  }
  document.getElementById('slbl').textContent=cfg.lbl;
  const isT=['dashboard','book_req','reels_mgmt','portfolio','earnings','t_sesi','t_profil'].includes(id);
  document.getElementById('ms').classList.toggle('on',!isT);
  document.getElementById('mt').classList.toggle('on',isT);
  cur=id;
}
function navigate(id){
  if(id==='back'){if(hist.length){const p=hist.pop();go(p,'back');}return;}
  if(id===cur)return;
  hist.push(cur);go(id,'fwd');
}
function setMode(m){hist=[];navigate(m==='student'?'home':'dashboard');}

document.addEventListener('click',e=>{
  const t=e.target.closest('[data-nav]');
  if(t)navigate(t.dataset.nav);
});

function buildFigma(){
  const w=document.getElementById('fgrid-wrap');
  const stud=FS.filter((_,i)=>i<9);
  const teach=FS.filter((_,i)=>i>=9);
  function sec(screens,title){
    return `<div class="fsec">${title}</div><div class="fgrid">${screens.map(s=>{
      const nv=s.nav?`<div class="fnav ${s.dk?'dnv':'lnv'}">${s.nt==='student'?navS(s.na):navT(s.na)}</div>`:'';
      return `<div class="ffrm"><div class="flbl">${s.lbl}</div><div class="fphone"><div class="fsb ${s.sb}"><span>09:41</span><div style="display:flex;gap:3px;font-size:8px;"><span>&#x25B2;</span><span>&#x25C4;</span><span>&#x25CF;&#x25CF;&#x25CF;</span></div></div><div class="fcnt${s.nav?'':' nn'}">${S[s.id]()}</div>${nv}</div></div>`;
    }).join('')}</div>`;
  }
  w.innerHTML=sec(stud,'Student Screens (9)')+sec(teach,'Teacher Screens (7)');
}
